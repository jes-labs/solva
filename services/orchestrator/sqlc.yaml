version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "query"
    gen:
      go:
        package: "repo"
        out: "internal/repo"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        # Generated files land beside the hand-written pool code in
        # internal/repo. They are committed so builds and CI need no codegen
        # step; regenerate with `just sqlc` after changing query/ or migrations/.
