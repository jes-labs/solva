[package]
name = "solva-prover"
version = "0.1.0"
edition = "2021"

[dependencies]
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Zeroizes the witness copy after proving so secret balances do not linger in memory.
zeroize = { version = "1", features = ["derive"] }

[build-dependencies]
tonic-build = "0.12"
