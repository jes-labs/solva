services:
  postgres:
    image: postgres:16-alpine
    container_name: solva-postgres
    environment:
      POSTGRES_USER: solva
      POSTGRES_PASSWORD: solva
      POSTGRES_DB: solva
    ports:
      - "5432:5432"
    volumes:
      - solva-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solva"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: solva-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # The prover with its pinned toolchain baked in (Noir beta.9, bb 0.87.0, CRS).
  # Opt-in, since building the image is slow: docker compose up -d prover, or
  # docker compose --profile prover up -d. The e2e can use this instead of a
  # host cargo run.
  prover:
    build:
      context: ..
      dockerfile: services/prover/Dockerfile
    image: solva-prover
    container_name: solva-prover
    profiles: ["prover"]
    ports:
      - "50051:50051"

volumes:
  solva-pgdata:
