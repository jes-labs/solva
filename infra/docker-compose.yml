services:
  postgres:
    image: postgres:16-alpine
    container_name: solva-postgres
    environment:
      POSTGRES_USER: solva
      POSTGRES_PASSWORD: solva
      POSTGRES_DB: solva
    ports:
      - "5432:5432"
    volumes:
      - solva-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solva"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: solva-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  solva-pgdata:
