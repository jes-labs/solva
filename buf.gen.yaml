version: v2
plugins:
  # Go message and gRPC stubs for the orchestrator.
  - remote: buf.build/protocolbuffers/go
    out: services/orchestrator/internal/infrastructure/grpc/proverpb
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: services/orchestrator/internal/infrastructure/grpc/proverpb
    opt: paths=source_relative
  # Rust stubs are generated by the prover's build.rs with tonic-build, not buf.
  # Keep that path in build.rs so the Rust crate stays self-contained.
